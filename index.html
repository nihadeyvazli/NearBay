<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NearBay</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}

#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;padding:2rem}
#login-screen h1{font-size:3rem;font-weight:800;color:#1DB954;margin-bottom:.5rem}
#login-screen p{color:#888;margin-bottom:2.5rem;line-height:1.6;max-width:260px}
.spotify-btn{background:#1DB954;color:#000;border:none;border-radius:50px;padding:16px 40px;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.5px}
.spotify-btn:hover{background:#1ed760}

#app-screen{display:none;flex-direction:column;height:100vh}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:#111;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.topbar h1{font-size:1.1rem;font-weight:800;color:#1DB954}
.np{display:flex;align-items:center;gap:8px;background:#1a1a1a;border-radius:50px;padding:7px 13px;max-width:200px}
.np-art{width:22px;height:22px;border-radius:4px;object-fit:cover;display:none}
.np-dot{width:7px;height:7px;border-radius:50%;background:#1DB954;animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.np-text{font-size:11px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.my-avatar{width:32px;height:32px;border-radius:50%;border:2px solid #1DB954;object-fit:cover;cursor:pointer;background:#222;flex-shrink:0}

#map{flex:1}
.leaflet-container{background:#141414}

.bottombar{display:flex;background:#111;border-top:1px solid #1a1a1a;flex-shrink:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.6rem;font-size:10px;color:#555;cursor:pointer;border:none;background:none;gap:3px;transition:color .2s}
.tab.active,.tab:hover{color:#1DB954}
.tab svg{width:20px;height:20px}

/* PANELS */
.panel{position:fixed;left:0;right:0;bottom:0;background:#111;border-radius:20px 20px 0 0;border-top:1px solid #222;z-index:2000;transform:translateY(100%);transition:transform .3s;max-height:75vh;overflow-y:auto;display:flex;flex-direction:column}
.panel.open{transform:translateY(0)}
.handle{width:36px;height:4px;background:#2a2a2a;border-radius:2px;margin:12px auto 4px;flex-shrink:0}
.panel-head{font-size:.95rem;font-weight:700;padding:.75rem 1rem;border-bottom:1px solid #1a1a1a;flex-shrink:0}

.profile-top{display:flex;align-items:center;gap:1rem;padding:1rem}
.p-avatar{width:60px;height:60px;border-radius:50%;border:3px solid #1DB954;object-fit:cover;background:#222}
.p-name{font-size:1rem;font-weight:700}
.p-sub{font-size:12px;color:#666;margin-top:3px}
.p-track{display:flex;align-items:center;gap:10px;margin:.25rem 1rem .75rem;background:#1a1a1a;border-radius:12px;padding:.75rem}
.p-track-art{width:38px;height:38px;border-radius:8px;object-fit:cover;background:#222;flex-shrink:0}
.p-track-name{font-size:13px;font-weight:600}
.p-track-artist{font-size:12px;color:#666;margin-top:2px}
.p-actions{display:flex;gap:.75rem;padding:.75rem 1rem 1.25rem}
.btn{flex:1;border:none;border-radius:50px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
.btn-green{background:#1DB954;color:#000}
.btn-green:hover{background:#1ed760}
.btn-gray{background:#1a1a1a;color:#fff}
.btn-gray:hover{background:#222}

.empty{text-align:center;padding:3rem 1rem;color:#444;font-size:13px}

.msg-item{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;border-bottom:1px solid #1a1a1a;cursor:pointer}
.msg-item:hover{background:#161616}
.msg-av{width:42px;height:42px;border-radius:50%;object-fit:cover;background:#222;flex-shrink:0}
.msg-info{flex:1;min-width:0}
.msg-name{font-size:13px;font-weight:600}
.msg-preview{font-size:12px;color:#555;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.fr-item{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;border-bottom:1px solid #1a1a1a}
.fr-av{width:42px;height:42px;border-radius:50%;object-fit:cover;background:#222;flex-shrink:0}
.fr-info{flex:1}
.fr-name{font-size:13px;font-weight:600}
.fr-track{font-size:12px;color:#555;margin-top:2px}
.fr-btn{background:#1a1a1a;border:1px solid #1DB954;color:#1DB954;border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer}

/* CHAT */
#chat{position:fixed;inset:0;background:#0a0a0a;z-index:3000;display:none;flex-direction:column}
#chat.open{display:flex}
.chat-top{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;background:#111;border-bottom:1px solid #1a1a1a}
.chat-back{background:none;border:none;color:#1DB954;font-size:1.3rem;cursor:pointer;line-height:1;padding:.2rem .4rem}
.chat-av{width:34px;height:34px;border-radius:50%;object-fit:cover;background:#222}
.chat-uname{font-size:14px;font-weight:600}
.chat-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.5rem}
.bubble{max-width:72%;padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.5;word-break:break-word}
.bubble.me{background:#1DB954;color:#000;align-self:flex-end;border-bottom-right-radius:5px}
.bubble.them{background:#1a1a1a;color:#fff;align-self:flex-start;border-bottom-left-radius:5px}
.chat-bar{display:flex;gap:.5rem;padding:.75rem 1rem;background:#111;border-top:1px solid #1a1a1a}
.chat-inp{flex:1;background:#1a1a1a;border:none;border-radius:50px;padding:10px 16px;color:#fff;font-size:13px;outline:none}
.chat-send{width:38px;height:38px;border-radius:50%;background:#1DB954;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* MAP MARKERS */
.u-marker{width:44px;height:44px;border-radius:50%;border:3px solid #1DB954;overflow:hidden;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.6)}
.u-marker img{width:100%;height:100%;object-fit:cover}
.you-pin{width:44px;height:44px;border-radius:50%;background:#1DB954;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#000;box-shadow:0 2px 12px rgba(29,185,84,.5)}

.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:8px 18px;font-size:12px;color:#ccc;opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>NearBay</h1>
  <p>See what people around you are listening to right now</p>
  <button class="spotify-btn" onclick="doLogin()">Connect with Spotify</button>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="topbar">
    <h1>NearBay</h1>
    <div class="np">
      <img class="np-art" id="np-art"/>
      <div class="np-dot" id="np-dot"></div>
      <span class="np-text" id="np-text">Loading...</span>
    </div>
    <img class="my-avatar" id="my-av" src="" onclick="openPanel('me-panel')" onerror="this.style.display='none'"/>
  </div>

  <div id="map"></div>

  <div class="bottombar">
    <button class="tab active" id="tab-map" onclick="switchTab('map')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
      Map
    </button>
    <button class="tab" id="tab-friends" onclick="switchTab('friends')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Friends
    </button>
    <button class="tab" id="tab-msgs" onclick="switchTab('msgs')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      Messages
    </button>
  </div>
</div>

<!-- MY PROFILE PANEL -->
<div class="panel" id="me-panel">
  <div class="handle"></div>
  <div class="panel-head">My Profile</div>
  <div class="profile-top">
    <img class="p-avatar" id="me-avatar" src="" onerror="this.src=''"/>
    <div><div class="p-name" id="me-name">-</div><div class="p-sub">Your Spotify account</div></div>
  </div>
  <div class="p-track" id="me-track" style="display:none">
    <img class="p-track-art" id="me-art" src=""/>
    <div><div class="p-track-name" id="me-tname"></div><div class="p-track-artist" id="me-tartist"></div></div>
  </div>
  <div class="p-actions"><button class="btn btn-gray" onclick="closePanel('me-panel')">Close</button></div>
</div>

<!-- USER PROFILE PANEL -->
<div class="panel" id="user-panel">
  <div class="handle"></div>
  <div class="panel-head">Profile</div>
  <div class="profile-top">
    <img class="p-avatar" id="u-avatar" src="" onerror="this.src=''"/>
    <div><div class="p-name" id="u-name">-</div><div class="p-sub" id="u-sub">Nearby listener</div></div>
  </div>
  <div class="p-track">
    <img class="p-track-art" id="u-art" src=""/>
    <div><div class="p-track-name" id="u-tname"></div><div class="p-track-artist" id="u-tartist"></div></div>
  </div>
  <div class="p-actions">
    <button class="btn btn-green" id="u-add-btn" onclick="addFriend()">Add Friend</button>
    <button class="btn btn-gray" onclick="startChat()">Message</button>
  </div>
</div>

<!-- FRIENDS PANEL -->
<div class="panel" id="friends-panel">
  <div class="handle"></div>
  <div class="panel-head">Friends</div>
  <div id="friends-list"><div class="empty">No friends yet — tap someone on the map!</div></div>
</div>

<!-- MESSAGES PANEL -->
<div class="panel" id="msgs-panel">
  <div class="handle"></div>
  <div class="panel-head">Messages</div>
  <div id="msgs-list"><div class="empty">No messages yet</div></div>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="chat-top">
    <button class="chat-back" onclick="closeChat()">←</button>
    <img class="chat-av" id="chat-av" src=""/>
    <span class="chat-uname" id="chat-uname"></span>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-bar">
    <input class="chat-inp" id="chat-inp" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()"/>
    <button class="chat-send" onclick="sendMsg()">
      <svg width="15" height="15" fill="none" stroke="#000" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const SPOTIFY_CLIENT_ID = 'b8e5aded95eb41fe9e56fadece750d3b';
const REDIRECT_URI      = 'https://nihadeyvazli.github.io/NearBay';
const SCOPES            = 'user-read-currently-playing user-read-playback-state user-read-private';
const SB_URL            = 'https://vctsnemocjzqfuedvzjf.supabase.co';
const SB_KEY            = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjdHNuZW1vY2p6cWZ1ZWR2empmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MDg4MzUsImV4cCI6MjA5MzM4NDgzNX0.TkZChWaBEmIReThnxbb8HRoaVR5kLsCOYC1YGL9D3w0';

// ── STATE ─────────────────────────────────────────────────
let map, me = null, chatUser = null, markers = {}, spToken = null;

// ── TOAST ─────────────────────────────────────────────────
function toast(msg, ms=2500){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),ms);
}

// ── PANELS ────────────────────────────────────────────────
function openPanel(id){ document.getElementById(id).classList.add('open'); }
function closePanel(id){ document.getElementById(id).classList.remove('open'); }
function switchTab(tab){
  ['map','friends','msgs'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
  closePanel('me-panel'); closePanel('user-panel');
  closePanel('friends-panel'); closePanel('msgs-panel');
  if(tab==='friends'){ openPanel('friends-panel'); loadFriends(); }
  if(tab==='msgs'){ openPanel('msgs-panel'); loadConversations(); }
}

// ── SUPABASE ──────────────────────────────────────────────
async function sbReq(method, table, body, query=''){
  const url = `${SB_URL}/rest/v1/${table}${query}`;
  const headers = {
    'apikey': SB_KEY,
    'Authorization': `Bearer ${SB_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': method==='POST' ? 'resolution=merge-duplicates,return=minimal' : 'return=representation'
  };
  const res = await fetch(url,{method,headers,body:body?JSON.stringify(body):undefined});
  if(res.status===204||res.status===201) return null;
  try{ return await res.json(); }catch{ return null; }
}

// ── SPOTIFY AUTH (PKCE) ───────────────────────────────────
function rnd(n){
  const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  return Array.from(crypto.getRandomValues(new Uint8Array(n))).map(b=>c[b%c.length]).join('');
}
async function pkceChallenge(v){
  const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
async function doLogin(){
  const v=rnd(64); localStorage.setItem('pv',v);
  const ch=await pkceChallenge(v);
  const p=new URLSearchParams({client_id:SPOTIFY_CLIENT_ID,response_type:'code',redirect_uri:REDIRECT_URI,scope:SCOPES,code_challenge_method:'S256',code_challenge:ch});
  location.href='https://accounts.spotify.com/authorize?'+p;
}
async function exchangeToken(code){
  const r=await fetch('https://accounts.spotify.com/api/token',{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams({client_id:SPOTIFY_CLIENT_ID,grant_type:'authorization_code',code,redirect_uri:REDIRECT_URI,code_verifier:localStorage.getItem('pv')})
  });
  const d=await r.json();
  if(d.access_token){
    localStorage.setItem('sp_t',d.access_token);
    localStorage.setItem('sp_e',Date.now()+d.expires_in*1000);
    localStorage.removeItem('pv');
    return d.access_token;
  }
  return null;
}
function savedToken(){
  const t=localStorage.getItem('sp_t'),e=localStorage.getItem('sp_e');
  return t&&e&&Date.now()<+e?t:null;
}
async function spFetch(path){
  try{
    const r=await fetch('https://api.spotify.com/v1'+path,{headers:{Authorization:'Bearer '+spToken}});
    if(r.status===204||r.status===401) return null;
    return r.json();
  }catch{return null;}
}

// ── MAP ───────────────────────────────────────────────────
function initMap(lat,lng){
  map=L.map('map',{zoomControl:false}).setView([lat,lng],15);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  L.control.zoom({position:'topright'}).addTo(map);
  const youIcon=L.divIcon({className:'',html:`<div class="you-pin">${(me.display_name||'Y')[0].toUpperCase()}</div>`,iconSize:[44,44],iconAnchor:[22,22]});
  L.marker([lat,lng],{icon:youIcon}).addTo(map);
}

function placeMarker(user){
  if(!user.lat||!user.lng||user.id===me?.id) return;
  if(markers[user.id]) map.removeLayer(markers[user.id]);
  const art=user.album_art||'https://via.placeholder.com/44/222/fff?text=♪';
  const icon=L.divIcon({className:'',html:`<div class="u-marker"><img src="${art}" onerror="this.src='https://via.placeholder.com/44/222/fff?text=♪'"/></div>`,iconSize:[44,44],iconAnchor:[22,22]});
  const m=L.marker([user.lat,user.lng],{icon}).addTo(map);
  m.on('click',()=>showUserPanel(user));
  markers[user.id]=m;
}

async function loadNearby(lat,lng){
  const d=0.05;
  const data=await sbReq('GET','users','',`?lat=gte.${lat-d}&lat=lte.${lat+d}&lng=gte.${lng-d}&lng=lte.${lng+d}&limit=50`);
  if(Array.isArray(data)) data.forEach(u=>{ if(u.id!==me.id) placeMarker(u); });
}

// ── USER PANEL ────────────────────────────────────────────
function showUserPanel(user){
  chatUser=user;
  document.getElementById('u-avatar').src=user.avatar_url||'';
  document.getElementById('u-name').textContent=user.display_name||'Unknown';
  document.getElementById('u-sub').textContent='Listening nearby';
  document.getElementById('u-art').src=user.album_art||'';
  document.getElementById('u-tname').textContent=user.current_track||'Not playing';
  document.getElementById('u-tartist').textContent=user.current_artist||'';
  document.getElementById('u-add-btn').textContent='Add Friend';
  document.getElementById('u-add-btn').disabled=false;
  openPanel('user-panel');
}

// ── FRIENDS ───────────────────────────────────────────────
async function addFriend(){
  if(!me||!chatUser) return;
  await sbReq('POST','friends',{user_id:me.id,friend_id:chatUser.id,status:'pending'});
  document.getElementById('u-add-btn').textContent='Request Sent ✓';
  document.getElementById('u-add-btn').disabled=true;
  toast('Friend request sent! 👋');
}

async function loadFriends(){
  const data=await sbReq('GET','friends','',`?user_id=eq.${me.id}`);
  const list=document.getElementById('friends-list');
  if(!Array.isArray(data)||data.length===0){
    list.innerHTML='<div class="empty">No friends yet — tap someone on the map!</div>'; return;
  }
  list.innerHTML=data.map(f=>`
    <div class="fr-item">
      <div class="fr-av" style="display:flex;align-items:center;justify-content:center;color:#666;font-size:18px">👤</div>
      <div class="fr-info"><div class="fr-name">${f.friend_id}</div><div class="fr-track">${f.status}</div></div>
      <button class="fr-btn">Message</button>
    </div>`).join('');
}

// ── CHAT ──────────────────────────────────────────────────
function startChat(){
  closePanel('user-panel');
  if(!chatUser) return;
  document.getElementById('chat-av').src=chatUser.avatar_url||'';
  document.getElementById('chat-uname').textContent=chatUser.display_name||'User';
  document.getElementById('chat').classList.add('open');
  loadMsgs();
}
function closeChat(){ document.getElementById('chat').classList.remove('open'); }

async function loadMsgs(){
  if(!me||!chatUser) return;
  const data=await sbReq('GET','messages','',`?or=(and(sender_id.eq.${me.id},receiver_id.eq.${chatUser.id}),and(sender_id.eq.${chatUser.id},receiver_id.eq.${me.id}))&order=created_at.asc&limit=100`);
  const c=document.getElementById('chat-msgs');
  if(!Array.isArray(data)||data.length===0){
    c.innerHTML='<div class="empty">Say hello! 👋</div>'; return;
  }
  c.innerHTML=data.map(m=>`<div class="bubble ${m.sender_id===me.id?'me':'them'}">${m.content}</div>`).join('');
  c.scrollTop=c.scrollHeight;
}

async function sendMsg(){
  const inp=document.getElementById('chat-inp');
  const txt=inp.value.trim();
  if(!txt||!me||!chatUser) return;
  inp.value='';
  await sbReq('POST','messages',{sender_id:me.id,receiver_id:chatUser.id,content:txt});
  loadMsgs();
}

async function loadConversations(){
  const data=await sbReq('GET','messages','',`?or=(sender_id.eq.${me.id},receiver_id.eq.${me.id})&order=created_at.desc&limit=50`);
  const list=document.getElementById('msgs-list');
  if(!Array.isArray(data)||data.length===0){
    list.innerHTML='<div class="empty">No messages yet</div>'; return;
  }
  const seen=new Set(); const convos=[];
  data.forEach(m=>{
    const other=m.sender_id===me.id?m.receiver_id:m.sender_id;
    if(!seen.has(other)){ seen.add(other); convos.push({other,last:m.content}); }
  });
  list.innerHTML=convos.map(c=>`
    <div class="msg-item" onclick="chatUser={id:'${c.other}',display_name:'${c.other}',avatar_url:'',album_art:''};startChat()">
      <div class="msg-av" style="display:flex;align-items:center;justify-content:center;color:#555;font-size:20px">💬</div>
      <div class="msg-info"><div class="msg-name">${c.other}</div><div class="msg-preview">${c.last}</div></div>
    </div>`).join('');
}

// ── INIT APP ──────────────────────────────────────────────
async function initApp(token){
  spToken=token;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';

  // Spotify profile
  const profile=await spFetch('/me');
  if(!profile){ toast('Spotify session expired — please reconnect'); localStorage.removeItem('sp_t'); return; }

  me={
    id:profile.id,
    display_name:profile.display_name||'Unknown',
    avatar_url:profile.images?.[0]?.url||'',
    current_track:'',current_artist:'',album_art:'',
    lat:null,lng:null
  };

  // Update UI
  document.getElementById('me-name').textContent=me.display_name;
  document.getElementById('me-avatar').src=me.avatar_url;
  document.getElementById('my-av').src=me.avatar_url;

  // Current track
  const track=await spFetch('/me/player/currently-playing');
  if(track?.item){
    me.current_track=track.item.name;
    me.current_artist=track.item.artists.map(a=>a.name).join(', ');
    me.album_art=track.item.album?.images?.[0]?.url||'';
    document.getElementById('np-text').textContent=`${me.current_track} — ${me.current_artist}`;
    const art=document.getElementById('np-art');
    art.src=me.album_art; art.style.display='block';
    document.getElementById('np-dot').style.display='none';
    document.getElementById('me-track').style.display='flex';
    document.getElementById('me-art').src=me.album_art;
    document.getElementById('me-tname').textContent=me.current_track;
    document.getElementById('me-tartist').textContent=me.current_artist;
  } else {
    document.getElementById('np-text').textContent='Nothing playing';
  }

  // Location
  navigator.geolocation.getCurrentPosition(async pos=>{
    me.lat=pos.coords.latitude; me.lng=pos.coords.longitude;
    initMap(me.lat,me.lng);
    await sbReq('POST','users',me);
    toast('📍 You are now visible on the map!');
    await loadNearby(me.lat,me.lng);

    // Refresh every 30s
    setInterval(async()=>{
      const t=await spFetch('/me/player/currently-playing');
      if(t?.item){
        me.current_track=t.item.name;
        me.current_artist=t.item.artists.map(a=>a.name).join(', ');
        me.album_art=t.item.album?.images?.[0]?.url||'';
        document.getElementById('np-text').textContent=`${me.current_track} — ${me.current_artist}`;
        document.getElementById('np-art').src=me.album_art;
        await sbReq('POST','users',me);
      }
      loadNearby(me.lat,me.lng);
    },30000);

  }, ()=>{
    toast('⚠️ Location access needed to show nearby listeners');
    initMap(40.4093,49.8671);
  });
}

// ── BOOT ──────────────────────────────────────────────────
window.addEventListener('load',async()=>{
  const params=new URLSearchParams(location.search);
  const code=params.get('code');
  if(code){
    history.replaceState({},'',REDIRECT_URI);
    toast('Connecting to Spotify...',3000);
    const token=await exchangeToken(code);
    if(token) initApp(token);
    else toast('❌ Auth failed — please try again');
    return;
  }
  const stored=savedToken();
  if(stored) initApp(stored);
});
</script>
